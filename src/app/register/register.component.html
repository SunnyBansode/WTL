<div>
  <h2>Register</h2>
  <form>
    <table>
      <tr>
        <td><label>Full Name:</label></td>
        <td><input type="text" placeholder="Full Name" required></td>
        <td><label>Email:</label></td>
        <td><input type="email" placeholder="Email" required></td>
      </tr>
      <tr>
        <td><label>Password:</label></td>
        <td><input type="password" placeholder="Password" required></td>
        <td><label>Confirm Password:</label></td>
        <td><input type="password" placeholder="Confirm Password" required></td>
      </tr>
      <tr>
        <td><label>Mobile Number:</label></td>
        <td><input type="tel" placeholder="Mobile Number" required></td>
        <td><label>Date of Birth:</label></td>
        <td><input type="date" required></td>
      </tr>
      <tr>
        <td><label>Gender:</label></td>
        <td>
          <select required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </td>
        <td><label>Blood Group:</label></td>
        <td>
          <select required>
            <option value="">Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </td>
      </tr>
      <tr>
        <td><label>Address:</label></td>
        <td><input type="text" placeholder="Address" required></td>
        <td><label>City:</label></td>
        <td><input type="text" placeholder="City" required></td>
      </tr>
      <tr>
        <td><label>State:</label></td>
        <td><input type="text" placeholder="State" required></td>
        <td><label>Postal Code:</label></td>
        <td><input type="text" placeholder="Postal Code" required></td>
      </tr>
      <tr>
        <td><label>Country:</label></td>
        <td><input type="text" placeholder="Country" required></td>
        <td><label>Nationality:</label></td>
        <td><input type="text" placeholder="Nationality" required></td>
      </tr>
      <tr>
        <td><label>Occupation:</label></td>
        <td><input type="text" placeholder="Occupation" required></td>
        <td><label>Company:</label></td>
        <td><input type="text" placeholder="Company" required></td>
      </tr>
      <tr>
        <td><label>Education:</label></td>
        <td><input type="text" placeholder="Education" required></td>
        <td><label>Emergency Contact:</label></td>
        <td><input type="tel" placeholder="Emergency Contact" required></td>
      </tr>
      <tr>
        <td colspan="4"><button type="submit">Register</button></td>
      </tr>
      <tr>
        <td colspan="4"><button type="button" class="secondary-btn" routerLink="/login">Back to Login</button></td>
      </tr>
    </table>
  </form>
</div>
