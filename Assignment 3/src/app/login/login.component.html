<div>
  <h2>Login</h2>
  <form>
    <table>
      <tr>
        <td><label>Name:</label></td>
        <td><input type="text" placeholder="Name" required></td>
      <tr>
        <td><label>Email:</label></td>
        <td><input type="email" placeholder="Email" required></td>
      </tr>
      <tr>
        <td><label>Mobile Number:</label></td>
        <td><input type="tel" placeholder="Mobile Number" required></td>
      </tr>
      <tr>
        <td><label>Password:</label></td>
        <td><input type="password" placeholder="Password" required></td>
      </tr>
      <tr>
        <td colspan="2"><button type="submit">Login</button></td>
      </tr>
      <tr>
        <td colspan="2"><button type="button" class="secondary-btn" routerLink="/register">Go to Registration</button></td>
      </tr>
    </table>
  </form>
</div>
